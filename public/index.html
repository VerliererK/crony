<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crony</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    body {
      background: #444;
      color: #eee;
      padding: 0;
      margin: 1em;
      font-family: Roboto, Arial, sans-serif;
      /* font-size: 16px; */
    }

    .main-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .url-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .no-select {
      -webkit-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
  </style>

  <style>
    /* bootstrap overrides */
    .btn-primary {
      background-color: #39d2b4 !important;
      border-color: #39d2b4 !important;
    }

    .spinner-border {
      margin-bottom: 3rem;
    }

    .form-group {
      display: flex;
      justify-content: center;
      width: 100%;
      gap: 1rem;
    }

    .form-group * {
      font-size: 16px;
    }

    .form-group #url {
      max-width: 24rem;
    }

    .form-group #interval {
      max-width: 6rem;
    }

    .form-check {
      display: flex;
      align-items: flex-start;
    }

    .form-check-label {
      flex: auto;
      overflow-wrap: anywhere;
    }

    .form-check-input {
      cursor: pointer;
      min-width: 32px;
      scale: 1.5;
      margin-right: 1rem;
    }

    .form-switch:has(input:checked) {
      color: #39d2b4;
    }

    .form-check-input:checked {
      background-color: #39d2b4;
      border-color: #39d2b4;
    }

    .btn-delete {
      padding: 2px 4px 0px;
      margin-left: 2rem;
    }
  </style>
</head>

<body>
  <div class="main-block">
    <h4>Urls</h4>
    <div class="form-group" style="margin-bottom: 3rem;">
      <input class="form-control" type="url" id="url" placeholder="Enter URL">
      <input class="form-control" type="number" id="interval" placeholder="minutes" min="1" max="3600">
      <button class="btn btn-primary" onclick="addUrl()">+</button>
    </div>

    <div id="loading" class="spinner-border" role="status"></div>
    <div id="urls" class="url-list"></div>

    <div class="modal"></div>
  </div>

  <script>
    async function getJobs() {
      const data = await fetch('/api/jobs').then(r => r.json());
      return data || [];
    }

    async function init() {
      const itemList = await getJobs();
      updateUI(itemList);
    }

    function loading(show = true) {
      document.getElementById("loading").hidden = !show;
      document.querySelector(".modal").style.display = show ? "block" : "none";
      document.querySelectorAll("button, input").forEach(el => { el.disabled = show; });
    }

    function selectUrlText(element) {
      const range = document.createRange();
      range.selectNodeContents(element);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function updateUI(list) {
      const container = document.getElementById("urls");
      container.innerHTML = "";

      for (const { url, interval, enabled } of list) {
        const el = document.createElement('div');
        el.className = "form-check form-switch";

        const enabledInput = document.createElement('input');
        enabledInput.className = "form-check-input";
        enabledInput.type = "checkbox";
        enabledInput.checked = enabled;
        enabledInput.onchange = () => enabledUrl(url, enabledInput.checked);

        const label = document.createElement('label');
        label.className = "form-check-label";
        label.style.opacity = "1";

        const urlText = document.createElement('span');
        urlText.onclick = () => selectUrlText(urlText);
        urlText.textContent = url;

        const intervalText = document.createElement('span');
        intervalText.className = "no-select";
        intervalText.textContent = ` (${interval} minutes)`;

        const deleteButton = document.createElement('button');
        deleteButton.className = "btn btn-danger btn-delete";
        deleteButton.innerHTML = '<i class="bi bi-trash"></i>';
        deleteButton.onclick = () => removeUrl(url);

        label.appendChild(urlText);
        label.appendChild(intervalText);
        el.appendChild(enabledInput);
        el.appendChild(label);
        el.appendChild(deleteButton);
        container.appendChild(el);
      }
      loading(false);
    }

    async function sendJobsRequest(method, body) {
      const response = await fetch('/api/jobs', {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!response.ok) {
        throw new Error(await response.text());
      }
    }

    async function refreshJobs() {
      const list = await getJobs();
      updateUI(list);
    }

    async function runOperation(operation) {
      loading(true);
      try {
        await operation();
        await refreshJobs();
      } catch (error) {
        console.error(error);
        alert("操作失敗，請稍後再試。");
        loading(false);
      }
    }

    async function addUrl() {
      const urlInput = document.getElementById("url");
      const intervalInput = document.getElementById("interval");
      const url = urlInput.value.trim();
      const interval = +intervalInput.value;
      if (!url || !interval) return;

      await runOperation(async () => {
        await sendJobsRequest("POST", { url, interval, enabled: true });
        urlInput.value = "";
        intervalInput.value = "";
      });
    }

    async function enabledUrl(url, enabled) {
      await runOperation(async () => {
        await sendJobsRequest("POST", { url, enabled });
      });
    }

    async function removeUrl(url) {
      await runOperation(async () => {
        await sendJobsRequest("DELETE", { url });
      });
    }

    init();
  </script>
</body>

</html>
